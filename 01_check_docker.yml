- name: "Перевірка Docker на хості"
  hosts: docker_hosts
  become: no
  gather_facts: no

  tasks:
    - name: "Перевірити чи Docker встановлений"
      command: docker --version
      register: docker_version
      changed_when: false

    - name: "Показати версію Docker"
      debug:
        msg: "Docker версія: {{ docker_version.stdout }}"

    - name: "Перевірити чи Docker daemon запущений"
      command: docker info
      register: docker_info
      changed_when: false

    - name: "Docker працює"
      debug:
        msg: "Docker працює коректно"
