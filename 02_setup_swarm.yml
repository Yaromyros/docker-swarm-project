- name: "Перевірка Docker Swarm"
  hosts: swarm_managers
  become: no
  gather_facts: no

  tasks:
    - name: "Перевірити статус Swarm"
      command: docker info --format '{%raw%}{{.Swarm.LocalNodeState}}{%endraw%}'
      register: swarm_status
      changed_when: false

    - name: "Показати статус Swarm"
      debug:
        msg: "Swarm статус: {{ swarm_status.stdout }}"

    - name: "Ініціалізувати Swarm якщо не активний"
      command: docker swarm init --advertise-addr 127.0.0.1
      when: swarm_status.stdout != "active"
      ignore_errors: yes

    - name: "Показати ноди кластеру"
      command: docker node ls
      register: node_list
      changed_when: false

    - name: "Список нод"
      debug:
        msg: "{{ node_list.stdout_lines }}"
