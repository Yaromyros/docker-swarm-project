- name: "Розгортання Hello World в Docker Swarm"
  hosts: swarm_managers
  become: no
  gather_facts: no

  vars:
    registry: "{{ docker_registry | default('127.0.0.1:6578') }}"
    image_name: "{{ app_image_name | default('hello-world-app') }}"
    image_tag: "{{ app_image_tag | default('latest') }}"
    service_name: "hello-world-service"
    replicas: 2
    published_port: 9090
    target_port: 5000

  tasks:
    - name: "Перевірити що Swarm активний"
      command: docker info --format '{%raw%}{{.Swarm.LocalNodeState}}{%endraw%}'
      register: swarm_check
      changed_when: false
      failed_when: swarm_check.stdout != "active"

    - name: "Пулнути імедж з Docker Registry"
      command: "docker pull {{ registry }}/{{ image_name }}:{{ image_tag }}"
      register: pull_result
      changed_when: false

    - name: "Перевірити чи сервіс існує"
      command: "docker service inspect {{ service_name }}"
      register: service_exists
      changed_when: false
      failed_when: false

    - name: "Оновити існуючий сервіс"
      command: >
        docker service update
        --image {{ registry }}/{{ image_name }}:{{ image_tag }}
        {{ service_name }}
      when: service_exists.rc == 0

    - name: "Створити новий сервіс в Swarm"
      command: >
        docker service create
        --name {{ service_name }}
        --replicas {{ replicas }}
        --publish published={{ published_port }},target={{ target_port }}
        {{ registry }}/{{ image_name }}:{{ image_tag }}
      when: service_exists.rc != 0

    - name: "Зачекати поки сервіс стартує"
      pause:
        seconds: 10

    - name: "Перевірити статус сервісу"
      command: docker service ls
      register: service_list
      changed_when: false

    - name: "Список сервісів"
      debug:
        msg: "{{ service_list.stdout_lines }}"
