# =============================================================
# Ansible Inventory — Docker Swarm Cluster
# =============================================================
# Замініть IP-адреси на ваші реальні адреси машин
# На macOS без VM — всі хости можуть бути localhost
# або реальні машини у вашій мережі
# =============================================================

[jenkins_master]
jenkins   ansible_host=127.0.0.1  ansible_user=your_user  ansible_connection=local

[swarm_managers]
manager1  ansible_host=127.0.0.1  ansible_user=your_user  ansible_connection=local

[swarm_workers]
worker1   ansible_host=192.168.1.101  ansible_user=your_user  ansible_ssh_private_key_file=~/.ssh/id_rsa
worker2   ansible_host=192.168.1.102  ansible_user=your_user  ansible_ssh_private_key_file=~/.ssh/id_rsa

[docker_hosts:children]
swarm_managers
swarm_workers

[all:vars]
ansible_python_interpreter=/usr/bin/python3
docker_registry=127.0.0.1:5000
app_image_name=hello-world-app
app_image_tag=latest
